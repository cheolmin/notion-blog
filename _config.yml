title: Cheolmin ML log
description: Azure와 AI/ML, 그리고 그 사이의 잡동사니
author: Cheolmin Ki
email: cheolmin.ki@microsoft.com
baseurl: "/notion-blog"
url: "https://cheolmin.github.io"

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# giscus comments (GitHub Discussions)
giscus:
  repo: "cheolmin/notion-blog"
  repo_id: "R_kgDOStfJog"
  category: "General"
  category_id: "DIC_kwDOStfJos4C-QGr"
  mapping: "pathname"
  reactions_enabled: "1"
  theme_light: "light"
  theme_dark: "dark"
  lang: "ko"

# Exclude from processing
exclude:
  - scripts/
  - requirements.txt
  - README.md
  - Gemfile
  - Gemfile.lock
  - .github/

# Pagination / defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
