name: Sync Notion to Repo

on:
  schedule:
    # Polls 4x/hour (~15-min cadence). Off the :00/:30 marks and spread
    # across minutes to reduce GitHub's scheduled-run skipping under load.
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python scripts/sync_notion.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts
          [ -d assets/images ] && git add assets/images || true
          if [ -n "$(git status --porcelain _posts assets/images)" ]; then
            git commit -m "chore(content): sync from Notion"
            git push
          else
            echo "No content changes."
          fi
