name: Sync Notion to Repo

on:
  schedule:
    # Polls every 30 minutes (off the :00 mark to avoid fleet congestion)
    - cron: "17,47 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python scripts/sync_notion.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain _posts)" ]; then
            git add _posts
            git commit -m "chore(content): sync from Notion"
            git push
          else
            echo "No content changes."
          fi
